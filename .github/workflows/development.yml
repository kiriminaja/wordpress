name: Publish TO WP-DEV

on:
  push:
    branches:
      - "development"

permissions:
  contents: write

jobs:
  build:
    name: "Deploy to wp-dev"
    runs-on: [self-hosted, kaj-devstag-wp-runner]
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"

      - name: Install gettext
        run: sudo apt-get update && sudo apt-get install -y gettext

      - name: Resolve version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          # Detect pre-release (alpha/beta) from tag, e.g. v2.1.17-alpha.1, v2.1.17-beta.2
          if [[ "$VERSION" =~ -(alpha|beta) ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Detected pre-release: ${VERSION}"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          

      - name: Build ZIP (official variant — WP.org-ready)
        run: make zip plain

      