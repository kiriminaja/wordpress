name: Release Deploy

on:
  push:
    tags:
      - '*'

jobs:
  build:
    name: 'Build & Push'
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Install Zipper
      uses: montudor/action-zip@v1

    - name: Get current time
      uses: josStorer/get-current-time@v2
      id: date
      with:
        format: YYYY-MM-DDHH:mm:ss
        utcOffset: "+07:00"

    - name: Compress The Version
      run: zip -qq -r kiriminaja-${{ github.ref_name }}.zip *

    - name: Authenticate to GCP
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCS_KA_KEY }}

    - name: Uploading ZIP
      id: upload-zip
      uses: google-github-actions/upload-cloud-storage@v1
      with:
        path: kiriminaja-${{ github.ref_name }}.zip
        destination: ${{ secrets.GCS_KA_BUCKET_NAME }}/wp
        predefineAcl: publicRead

    - name: Rewrite the Woocommerce File
      id: rewrite-json
      uses: restackio/update-json-values-action@v1.0.0
      with:
        file: woocommerce-test.json
        values: "{\"name\":\"Kiriminaja\",\"slug\":\"kiriminaja\",\"author\":\"<a href='https://kiriminaja.com'>KiriminAja</a>\",\"author_profile\":\"https://kiriminaja.com/integration\",\"version\":\"${{ github.ref_name }}\",\"download_url\":\"https://storage.googleapis.com/tprt0ezsggqjornc7nf1wwluvgulhr/wp/kiriminaja-${{ github.ref_name }}.zip\",\"requires\":\"0.0.26\",\"tested\":\"7.0\",\"requires_php\":\"7.0\",\"last_updated\":\"2023-11-0402:10:00\",\"sections\":{\"description\":\"KiriminAja Plugin\",\"installation\":\"Upload file plugin lalu klik pada tombol aktivasi.\",\"changelog\":\"<h4>1.0â€“01Februari2023</h4><ul><li>Bugfixes.</li><li>Inititalrelease.</li></ul>\"}}"

    - name: Upload WooCommerce.json file
      id: upload-json
      uses: google-github-actions/upload-cloud-storage@v1
      with:
        path: woocommerce-test.json
        destination: ${{ secrets.GCS_KA_BUCKET_NAME }}/wp
        predefineAcl: publicRead
