name: Publish

on:
  release:
    types: ["published"]
  push:
    tags:
      - "*"

jobs:
  build:
    if: "!github.event.release.prerelease"
    name: "Build & Push"
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"

      - name: Get current time
        id: date
        run: echo "date=$(TZ='Asia/Jakarta' date +'%Y-%m-%d %H:%M')" >> "$GITHUB_OUTPUT"

      - name: Read plugin version
        id: version
        run: echo "version=$(grep "KIRIOF_VERSION" kiriminaja.php | sed "s/.*'\([0-9.]*\)'.*/\1/")" >> "$GITHUB_OUTPUT"

      - name: Build ZIP (legacy variant — includes UpdaterController)
        run: make zip-legacy

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_PRD_CICD }}

      - name: Uploading ZIP
        id: upload-zip
        uses: google-github-actions/upload-cloud-storage@v1
        with:
          path: kiriminaja-official-legacy-${{ steps.version.outputs.version }}.zip
          destination: ${{ secrets.GCS_KA_PRD_WEB }}/wp
          predefinedAcl: "publicRead"

      - name: Initiate Json File
        id: rewrite-json
        uses: devops-actions/json-to-file@v1.0.0
        with:
          filename: woocommerce.json
          json: '{"name":"KiriminAja Official","slug":"kiriminaja-official","author":"<a href=''https://kiriminaja.com''>KiriminAja</a>","author_profile":"https://kiriminaja.com/about","tested":"6.9","requires_php":"7.0","force_update":false,"force_message":"","sections":{"description":"KiriminAja Official Plugin for WooCommerce","installation":"Click the activation button.","changelog":"See readme.txt for full changelog."}}'

      - name: Update version value
        uses: jossef/action-set-json-field@v2.1
        with:
          file: woocommerce.json
          field: version
          value: ${{ steps.version.outputs.version }}

      - name: Update requires value
        uses: jossef/action-set-json-field@v2.1
        with:
          file: woocommerce.json
          field: requires
          value: ${{ steps.version.outputs.version }}

      - name: Update download url value
        uses: jossef/action-set-json-field@v2.1
        with:
          file: woocommerce.json
          field: download_url
          value: https://kaj-prd-core-web-assets.kiriminaja.com/wp/kiriminaja-official-legacy-${{ steps.version.outputs.version }}.zip

      - name: Update last update value
        uses: jossef/action-set-json-field@v2.1
        with:
          file: woocommerce.json
          field: last_updated
          value: ${{ steps.date.outputs.date }}

      - name: Update force_update flag
        uses: jossef/action-set-json-field@v2.1
        with:
          file: woocommerce.json
          field: force_update
          value: ${{ vars.FORCE_UPDATE || 'false' }}

      - name: Update force_message
        uses: jossef/action-set-json-field@v2.1
        with:
          file: woocommerce.json
          field: force_message
          value: ${{ vars.FORCE_MESSAGE || '' }}

      - name: Upload WooCommerce.json file
        id: upload-json
        uses: google-github-actions/upload-cloud-storage@v1
        with:
          path: woocommerce.json
          destination: ${{ secrets.GCS_KA_PRD_WEB }}/wp
          predefinedAcl: "publicRead"
