name: Release Deploy

on:
  push:
    tags:
      - '*'

jobs:
  build:
    name: 'Build & Push'
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Install Zipper
      uses: montudor/action-zip@v1

    - name: Get current time
      id: date
      run: echo "::set-output name=date::$(date +'%Y-%m-%d')"

    - name: Compress The Version
      run: zip -qq -r kiriminaja-${{ github.ref_name }}.zip *

    - name: Authenticate to GCP
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCS_KA_KEY }}

    - name: Uploading ZIP
      id: upload-zip
      uses: google-github-actions/upload-cloud-storage@v1
      with:
        path: kiriminaja-${{ github.ref_name }}.zip
        destination: ${{ secrets.GCS_KA_BUCKET_NAME }}/wp
        predefineAcl: publicRead

    - name: Rewrite the Woocommerce File
      id: rewrite-json
      uses: devops-actions/json-to-file@v1.0.0
      with:
        filename: 'woocommerce-test.json'
        json: '{
  "name" : "KiriminAja Plugin",
  "slug" : "kiriminaja",
  "author" : "<a href=https://kiriminaja.com>KiriminAja</a>",
  "author_profile" : "https://kiriminaja.com/integration",
  "version" : "{{github.ref_name}}",
  "download_url" : "https://storage.googleapis.com/tprt0ezsggqjornc7nf1wwluvgulhr/wp/kiriminaja-%{github.ref_name}.zip",
  "requires" : "{{github.ref_name}}",
  "tested" : "7.0",
  "requires_php" : "7.0",
  "last_updated" : "{{github.ref_name}}",
  "sections" : {
    "description" : "KiriminAja Plugin",
    "installation" : "Upload plugin zip lalu klik pada tombo Aktivasi",
    "changelog" : "<h4>{{steps.date.outputs.date}}</h4><ul><li>Bug fixes and perfromance improvement.</li></ul>"
  }
}'

    - name: Upload WooCommerce.json file
      id: upload-json
      uses: google-github-actions/upload-cloud-storage@v1
      with:
        path: woocommerce-test.json
        destination: ${{ secrets.GCS_KA_BUCKET_NAME }}/wp
        predefineAcl: publicRead
