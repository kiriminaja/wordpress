name: Publish

on:
  release:
    types: ["published"]

jobs:
  build:
    if: "!github.event.release.prerelease"
    name: "Build & Push"
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: |
          # Extract version from tag (remove 'v' prefix if present)
          TAG=${GITHUB_REF#refs/tags/}
          VERSION=${TAG#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION"

      - name: Get current time
        id: date
        run: echo "::set-output name=date::$(TZ="Asia/Jakarta" date +'%Y-%m-%d %H:%I')"

      - name: Download release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"

          # List all assets from this release
          echo "Fetching release assets..."
          ASSETS=$(gh release view ${{ github.ref_name }} --json assets -q '.assets[].name')
          echo "Available assets:"
          echo "$ASSETS"

          # Try to find the ZIP file (could be with or without 'v' prefix)
          ZIP_NAME=""
          for asset in $ASSETS; do
            if [[ $asset == kiriminaja-*.zip ]]; then
              ZIP_NAME=$asset
              break
            fi
          done

          if [ -z "$ZIP_NAME" ]; then
            echo "❌ No ZIP file found in release assets!"
            echo "Expected: kiriminaja-*.zip"
            echo "Building from source instead..."
            exit 1
          fi

          echo "📦 Downloading $ZIP_NAME..."
          gh release download ${{ github.ref_name }} -p "$ZIP_NAME"

          # Rename to expected filename if different
          EXPECTED_NAME="kiriminaja-${VERSION}.zip"
          if [ "$ZIP_NAME" != "$EXPECTED_NAME" ]; then
            echo "Renaming $ZIP_NAME to $EXPECTED_NAME"
            mv "$ZIP_NAME" "$EXPECTED_NAME"
          fi

          echo "✅ Downloaded and ready: $EXPECTED_NAME"

      - name: Fallback - Build from source if download fails
        if: failure()
        uses: thedoctor0/zip-release@0.7.5
        with:
          type: "zip"
          filename: kiriminaja-${{ steps.get_version.outputs.version }}.zip
          exclusions: "*.git* *.github* /*node_modules/* .editorconfig .gitattributes *.sh .vscode .idea *.md !README.md COMPLIANCE_CHECKLIST.md download-libraries.sh update-version.sh"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_PRD_CICD }}

      - name: Uploading ZIP
        id: upload-zip
        uses: google-github-actions/upload-cloud-storage@v1
        with:
          path: kiriminaja-${{ steps.get_version.outputs.version }}.zip
          destination: ${{ secrets.GCS_KA_PRD_WEB }}/wp
          predefinedAcl: "publicRead"

      - name: Initiate Json File
        id: rewrite-json
        uses: devops-actions/json-to-file@v1.0.0
        with:
          filename: woocommerce.json
          json: '{"name":"KiriminAja Plugin","slug":"kiriminaja","author":"<a href=''https://kiriminaja.com''>KiriminAja</a>","author_profile":"https://kiriminaja.com/about","tested":"7.0","requires_php":"7.0","sections":{"description":"KiriminAja Plugin Update","installation":"Click the activation button.","changelog":"Bug fixing and performance improvement"}}'

      - name: Update version value
        uses: jossef/action-set-json-field@v2.1
        with:
          file: woocommerce.json
          field: version
          value: ${{ steps.get_version.outputs.version }}

      - name: Update requires value
        uses: jossef/action-set-json-field@v2.1
        with:
          file: woocommerce.json
          field: requires
          value: ${{ steps.get_version.outputs.version }}

      - name: Update download url value
        uses: jossef/action-set-json-field@v2.1
        with:
          file: woocommerce.json
          field: download_url
          value: https://kaj-prd-core-web-assets.kiriminaja.com/wp/kiriminaja-${{ steps.get_version.outputs.version }}.zip

      - name: Update last update value
        uses: jossef/action-set-json-field@v2.1
        with:
          file: woocommerce.json
          field: last_updated
          value: ${{ steps.date.outputs.date }}

      - name: Upload WooCommerce.json file
        id: upload-json
        uses: google-github-actions/upload-cloud-storage@v1
        with:
          path: woocommerce.json
          destination: ${{ secrets.GCS_KA_PRD_WEB }}/wp
          predefinedAcl: "publicRead"
