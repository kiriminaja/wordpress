name: Deploy

on:
  push:
    branches:
      - development

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Sync
        uses: patrickwyler/gcs-bucket-sync-action@1.3
        with:
          secrets: ${{ secrets.GCS_KA_KEY }}
          bucket: ${{ secrets.GCS_KA_BUCKET_NAME }}
          exclude: '.*\.md$|\.gitignore$|\.git/.*$|\.github/.*$'
