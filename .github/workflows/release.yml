name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: "Build & Push"
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"

      - name: Resolve version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          # Detect pre-release (alpha/beta) from tag, e.g. v2.1.17-alpha.1, v2.1.17-beta.2
          if [[ "$VERSION" =~ -(alpha|beta) ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Detected pre-release: ${VERSION}"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build ZIP (official variant — WP.org-ready)
        run: make zip

      - name: Authenticate to GCP
        if: steps.version.outputs.prerelease == 'false'
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_PRD_CICD }}

      - name: Uploading ZIP (official)
        if: steps.version.outputs.prerelease == 'false'
        id: upload-zip-official
        uses: google-github-actions/upload-cloud-storage@v1
        with:
          path: kiriminaja-official-${{ steps.version.outputs.version }}.zip
          destination: ${{ secrets.GCS_KA_PRD_WEB }}/wp
          predefinedAcl: "publicRead"

      - name: Extract changelog from readme.txt
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          {
            echo "body<<__EOF__"
            php -r '
              $version = $argv[1];
              $readme = file_get_contents("readme.txt");
              if (preg_match("/^= " . preg_quote($version, "/") . " =\s*\n(.*?)(?=^= |\z)/ms", $readme, $m)) {
                  $lines = array_filter(array_map("trim", explode("\n", trim($m[1]))));
                  foreach ($lines as $line) {
                      echo str_starts_with($line, "* ") ? "- " . substr($line, 2) . "\n" : $line . "\n";
                  }
              }
            ' "$VERSION"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Extract contributors from commits
        id: contributors
        run: |
          # Get the previous tag to scope the range
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi
          # Collect unique GitHub usernames from commits
          CONTRIBUTORS=$(git log "$RANGE" --format="%aN" --no-merges | sort -u | while read -r name; do
            echo "- @${name}"
          done)
          {
            echo "list<<__EOF__"
            echo "$CONTRIBUTORS"
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          prerelease: ${{ steps.version.outputs.prerelease == 'true' }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.body }}

            ### Contributors

            ${{ steps.contributors.outputs.list }}

            ### Assets

            - `kiriminaja-official-${{ steps.version.outputs.version }}.zip` — WP.org-ready build.
          generate_release_notes: true
          files: |
            kiriminaja-official-${{ steps.version.outputs.version }}.zip
          make_latest: ${{ steps.version.outputs.prerelease == 'false' && 'true' || 'false' }}

      - name: Deploy to WordPress.org SVN
        if: steps.version.outputs.prerelease == 'false'
        uses: 10up/action-wordpress-plugin-deploy@stable
        with:
          generate-zip: false
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: kiriminaja-official
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_DIR: build/kiriminaja-official
          ASSETS_DIR: .wordpress-org

      # Update woocommerce.json AFTER SVN deploy so the download URL is live
      # before legacy installs (with UpdaterController) see the new version.
      - name: Get current time
        if: steps.version.outputs.prerelease == 'false'
        id: date
        run: echo "date=$(TZ='Asia/Jakarta' date +'%Y-%m-%d %H:%M')" >> "$GITHUB_OUTPUT"

      - name: Initiate woocommerce.json
        if: steps.version.outputs.prerelease == 'false'
        id: rewrite-json
        uses: devops-actions/json-to-file@v1.0.0
        with:
          filename: woocommerce.json
          json: '{"name":"KiriminAja Official","slug":"kiriminaja-official","author":"<a href=''https://kiriminaja.com''>KiriminAja</a>","author_profile":"https://kiriminaja.com/about","tested":"6.9","requires_php":"7.0","force_update":false,"force_message":"","sections":{"description":"KiriminAja Official Plugin for WooCommerce","installation":"Click the activation button.","changelog":"See readme.txt for full changelog."}}'

      - name: Update version value
        if: steps.version.outputs.prerelease == 'false'
        uses: jossef/action-set-json-field@v2.1
        with:
          file: woocommerce.json
          field: version
          value: ${{ steps.version.outputs.version }}

      - name: Update requires value
        if: steps.version.outputs.prerelease == 'false'
        uses: jossef/action-set-json-field@v2.1
        with:
          file: woocommerce.json
          field: requires
          value: "6.0"

      - name: Update download url value
        if: steps.version.outputs.prerelease == 'false'
        uses: jossef/action-set-json-field@v2.1
        with:
          file: woocommerce.json
          field: download_url
          value: https://downloads.wordpress.org/plugin/kiriminaja-official.${{ steps.version.outputs.version }}.zip

      - name: Update last update value
        if: steps.version.outputs.prerelease == 'false'
        uses: jossef/action-set-json-field@v2.1
        with:
          file: woocommerce.json
          field: last_updated
          value: ${{ steps.date.outputs.date }}

      - name: Update force_update flag
        if: steps.version.outputs.prerelease == 'false'
        uses: jossef/action-set-json-field@v2.1
        with:
          file: woocommerce.json
          field: force_update
          value: ${{ vars.FORCE_UPDATE == 'true' && 'true' || 'false' }}
          parse_json: true

      - name: Update force_message
        if: steps.version.outputs.prerelease == 'false' && vars.FORCE_MESSAGE != ''
        uses: jossef/action-set-json-field@v2.1
        with:
          file: woocommerce.json
          field: force_message
          value: ${{ vars.FORCE_MESSAGE }}

      - name: Upload woocommerce.json
        if: steps.version.outputs.prerelease == 'false'
        id: upload-json
        uses: google-github-actions/upload-cloud-storage@v1
        with:
          path: woocommerce.json
          destination: ${{ secrets.GCS_KA_PRD_WEB }}/wp
          predefinedAcl: "publicRead"
