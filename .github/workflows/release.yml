name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: "Build & Push"
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:      
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"

      - name: Install gettext
        run: sudo apt-get update && sudo apt-get install -y gettext

      - name: Resolve version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          # Detect pre-release (alpha/beta) from tag, e.g. v2.1.17-alpha.1, v2.1.17-beta.2
          if [[ "$VERSION" =~ -(alpha|beta) ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Detected pre-release: ${VERSION}"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          

      - name: Build ZIP (official variant — WP.org-ready)
        run: make zip plain

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          prerelease: ${{ steps.version.outputs.prerelease == 'true' }}
          body: |
            ### Assets

            - `kiriminaja-official.zip` — WP.org-ready build (v${{ steps.version.outputs.version }}).
          generate_release_notes: true
          files: |
            kiriminaja-official.zip
          make_latest: ${{ steps.version.outputs.prerelease == 'false' && 'true' || 'false' }}

      - name: Deploy to WordPress.org SVN
        if: steps.version.outputs.prerelease == 'false'
        uses: 10up/action-wordpress-plugin-deploy@stable
        with:
          generate-zip: false
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: kiriminaja-official
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_DIR: build/kiriminaja-official
          ASSETS_DIR: .wordpress-org
