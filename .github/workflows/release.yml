name: Release Deploy

on:
  push:
    tags:
      - '*'

jobs:
  build:
    name: 'Build & Push'
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Install Zipper
      uses: montudor/action-zip@v1

    - name: Get current time
      id: date
      run: echo "::set-output name=date::$(date +'%Y-%m-%d')"

    - name: Compress The Version
      run: zip -qq -r kiriminaja-${{ github.ref_name }}.zip *

    - name: Authenticate to GCP
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCS_KA_KEY }}

    - name: Uploading ZIP
      id: upload-zip
      uses: google-github-actions/upload-cloud-storage@v1
      with:
        path: kiriminaja-${{ github.ref_name }}.zip
        destination: ${{ secrets.GCS_KA_BUCKET_NAME }}/wp
        predefinedAcl: 'publicRead'

    - name: Create JSON File
      id: create-json
      uses: schdck/create-env-json@v1
      with:
        file-name: 'wc.json'
        name: "KiriminAja"
        slug: "kiriminaja"
        author: <a href='https://kiriminaja.com'>KiriminAja</a>
        author_profile: https://kiriminaja.com/about
        version: ${{ github.ref_name }}
        download_url: https://storage.googleapis.com/${{ secrets.GCS_KA_BUCKET_NAME }}/wp/kiriminaja-${{ github.ref_name }}.zip
        requires: ${{ github.ref_name }}
        tested: 7.0
        requires_php: 7.0
        last_updated: ${{ steps.date.outputs.date }}
        sections: '{
    "description" : "KiriminAja Wordpress Plugin Update",
    "installation" : "Klik pada tombol update dan lakukan aktivasi",
    "changelog" : "Bug fixing and performance improvement"
  }'
    - name: Upload WooCommerce.json file
      id: upload-json
      uses: google-github-actions/upload-cloud-storage@v1
      with:
        path: wc.json
        destination: ${{ secrets.GCS_KA_BUCKET_NAME }}/wp
        predefinedAcl: 'publicRead'
