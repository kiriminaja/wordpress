name: Release Deploy

on:
  push:
    tags:
      - '*'

jobs:
  build:
    name: 'Build & Push'
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Install zip
      uses: montudor/action-zip@v1
      
    - name: Get current time
      uses: josStorer/get-current-time@v2
      id: date
      with:
        format: YYYY-MM-DDHH:mm:ss
        utcOffset: "+07:00"      

    - name: Zipping Version
      run: zip -qq -r kiriminaja-${{ github.ref_name }}.zip *

    - name: Auth to GCP
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCS_KA_KEY }}
        
    - name: Uploading ZIP
      id: upload-zip
      uses: google-github-actions/upload-cloud-storage@v1
      with:
        path: kiriminaja-${{ github.ref_name }}.zip
        destination: ${{ secrets.GCS_KA_BUCKET_NAME }}/wp
