name: Release Deploy

on:
  push:
    tags:
      - '*'

jobs:
  build:
    name: 'Build & Push'
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Zipper
        uses: montudor/action-zip@v1

      - name: Get current time
        id: date
        run: echo "::set-output name=date::$(date +'%Y-%m-%d %H:%I')"

      - name: Compress The Version
        run: zip -qq -r kiriminaja-${{ github.ref_name }}.zip *

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCS_KA_KEY }}

      - name: Uploading ZIP
        id: upload-zip
        uses: google-github-actions/upload-cloud-storage@v1
        with:
          path: kiriminaja-${{ github.ref_name }}.zip
          destination: ${{ secrets.GCS_KA_BUCKET_NAME }}/wp
          predefinedAcl: 'publicRead'

      - name: Initiate Json File
        id: rewrite-json
        uses: devops-actions/json-to-file@v1.0.0
        with:
          filename: wp.json
          json: "{\"name\":\"KiriminAja Plugin\",\"slug\":\"kiriminaja\",\"author\":\"<a href='https://kiriminaja.com'>KiriminAja</a>\",\"author_profile\":\"https://kiriminaja.com/about\",\"tested\":\"7.0\",\"requires_php\":\"7.0\",\"sections\":{\"description\":\"KiriminAja Plugin Update\",\"installation\":\"Click the activation button.\",\"changelog\":\"Bug fixing and performance improvement\"}}"

      - name: Update version value
        uses: jossef/action-set-json-field@v2.1
        with:
          file: wp.json
          field: version
          value: ${{ github.ref_name }}

      - name: Update requires value
        uses: jossef/action-set-json-field@v2.1
        with:
          file: wp.json
          field: requires
          value: ${{ github.ref_name }}

      - name: Update download url value
        uses: jossef/action-set-json-field@v2.1
        with:
          file: wp.json
          field: download_url
          value: https://storage.googleapis.com/${{ secrets.GCS_KA_BUCKET_NAME }}/wp/kiriminaja-${{ github.ref_name }}.zip

      - name: Update last update value
        uses: jossef/action-set-json-field@v2.1
        with:
          file: wp.json
          field: last_updated
          value: ${{ steps.date.outputs.date }}

      - name: Upload WooCommerce.json file
        id: upload-json
        uses: google-github-actions/upload-cloud-storage@v1
        with:
          path: wp.json
          destination: ${{ secrets.GCS_KA_BUCKET_NAME }}/wp
          predefinedAcl: 'publicRead'
