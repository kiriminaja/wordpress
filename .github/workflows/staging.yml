name: Publish TO WP-STG

on:
  push:
    branches:
      - "staging"

permissions:
  contents: write

jobs:
  build:
    name: "Deploy to wp-stg"
    runs-on: [self-hosted, kaj-devstag-wp-runner]
    defaults:
      run:
        shell: bash

    steps:      
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"

      - name: Install gettext
        run: |
          if command -v msgfmt >/dev/null 2>&1; then
            exit 0
          fi
          sudo rm -f /etc/apt/sources.list.d/azure-cli.sources /etc/apt/sources.list.d/microsoft-prod.list
          sudo apt-get update
          sudo apt-get install -y gettext

      - name: Resolve version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          # Detect pre-release (alpha/beta) from tag, e.g. v2.1.17-alpha.1, v2.1.17-beta.2
          if [[ "$VERSION" =~ -(alpha|beta) ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Detected pre-release: ${VERSION}"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          

      - name: Build ZIP (official variant — WP.org-ready)
        run: make zip plain

      - name: Extract Zip to release
        run: |
          rm -rf /opt/wordpress/wp_dev/wp-content/plugins/kiriminaja-official
          unzip -o kiriminaja-official.zip -d /opt/wordpress/wp_dev/wp-content/plugins/
          rm -rf kiriminaja-official.zip
