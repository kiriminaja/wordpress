name: Plugin Wordrpress Kiriminaja Staging
on:
  push:
    branches:
      - staging

jobs:
  upload-gcs-prd:
    name: "Build & Push"
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from plugin file
        id: get_base_version
        run: |
          # Extract base version from kiriminaja.php (e.g., 2.0.10)
          BASE_VERSION=$(grep "Version:" kiriminaja.php | head -1 | awk '{print $NF}')
          echo "base_version=$BASE_VERSION" >> $GITHUB_OUTPUT
          echo "Base version: $BASE_VERSION"

      - name: Generate staging version
        id: get_version
        run: |
          # Create staging version: base.runid-stg (e.g., 2.0.10001-stg)
          BASE="${{ steps.get_base_version.outputs.base_version }}"
          VERSION="${BASE}${{ github.run_id }}-stg"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Staging version: $VERSION"

      - name: Get current time
        id: date
        run: echo "date=$(TZ='Asia/Jakarta' date +'%Y-%m-%d %H:%M')" >> $GITHUB_OUTPUT

      - name: Archive release
        uses: thedoctor0/zip-release@0.7.5
        with:
          type: "zip"
          filename: kiriminaja-${{ steps.get_version.outputs.version }}-stg.zip
          exclusions: "*.git* *.github* /*node_modules/* .editorconfig .gitattributes *.sh .vscode .idea *.md !README.md"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_PRD_CICD }}

      - name: Uploading ZIP
        id: upload-zip
        uses: google-github-actions/upload-cloud-storage@v1
        with:
          path: kiriminaja-${{ steps.get_version.outputs.version }}-stg.zip
          destination: ${{ secrets.GCS_KA_PRD_WEB }}/wp/staging
          predefinedAcl: "publicRead"
          headers: |
            cache-control: no-store, no-cache, must-revalidate, max-age=0

      - name: Create version info file
        run: |
          cat > staging-version.json << EOF
          {
            "name": "KiriminAja Plugin (Staging)",
            "slug": "kiriminaja-staging",
            "version": "${{ steps.get_version.outputs.version }}",
            "base_version": "${{ steps.get_base_version.outputs.base_version }}",
            "build_id": "${{ github.run_id }}",
            "branch": "${{ github.ref_name }}",
            "download_url": "https://kaj-prd-core-web-assets.kiriminaja.com/wp/staging/kiriminaja-${{ steps.get_version.outputs.version }}-stg.zip",
            "last_updated": "${{ steps.date.outputs.date }}",
            "commit_sha": "${{ github.sha }}",
            "environment": "staging"
          }
          EOF
          cat staging-version.json

      - name: Upload version info
        uses: google-github-actions/upload-cloud-storage@v1
        with:
          path: staging-version.json
          destination: ${{ secrets.GCS_KA_PRD_WEB }}/wp/staging
          predefinedAcl: "publicRead"
          headers: |
            cache-control: no-store, no-cache, must-revalidate, max-age=0

      - name: Summary
        run: |
          echo "## Staging Build Complete 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.get_version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Base Version:** ${{ steps.get_base_version.outputs.base_version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Build ID:** ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Download URL:**" >> $GITHUB_STEP_SUMMARY
          echo "https://kaj-prd-core-web-assets.kiriminaja.com/wp/staging/kiriminaja-${{ steps.get_version.outputs.version }}-stg.zip" >> $GITHUB_STEP_SUMMARY

