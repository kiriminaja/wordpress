name: Tests

on:
  pull_request:
    branches:
      - main
      - staging
      - development

  workflow_dispatch:

# Cancel in-progress runs for the same PR/branch when a new commit is pushed.
concurrency:
  group: tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: "Static Tests (PHP 8.1)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          tools: composer

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install gettext
        run: |
          if command -v msgfmt >/dev/null 2>&1; then
            exit 0
          fi
          sudo rm -f /etc/apt/sources.list.d/azure-cli.sources /etc/apt/sources.list.d/microsoft-prod.list
          sudo apt-get update
          sudo apt-get install -y gettext

      - name: Build official zip
        id: build
        run: |
          make zip
          ZIP_FILE=$(ls kiriminaja-official*.zip 2>/dev/null | sort | head -1)
          test -n "$ZIP_FILE" || { echo "ERROR: build zip not found"; exit 1; }
          echo "zip_file=$ZIP_FILE" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: make test

      - name: Upload build artifact for integration tests
        uses: actions/upload-artifact@v4
        with:
          name: plugin-build
          path: ${{ steps.build.outputs.zip_file }}
          if-no-files-found: error

      - name: Unpack staged build for Plugin Check
        run: |
          mkdir -p /tmp/pcp
          unzip -q "${{ steps.build.outputs.zip_file }}" -d /tmp/pcp
          ls -la /tmp/pcp/kiriminaja-official

      - name: Create wp-env config in plugin dir
        run: |
          echo '{"testsEnvironment":false}' > /tmp/pcp/kiriminaja-official/.wp-env.json

      - name: WordPress Plugin Check (WP.org compliance)
        timeout-minutes: 15
        # Pin v1.1.4 until wordpress/plugin-check-action@v1 reliably runs
        # wp-env on GitHub's Node 24 runner. v1.1.5+ can report
        # "Environment not initialized" immediately after wp-env start.
        uses: wordpress/plugin-check-action@v1.1.4
        continue-on-error: true
        with:
          build-dir: /tmp/pcp/kiriminaja-official
          wp-version: "latest"
          categories: |
            general
            plugin_repo
            security
            performance
            accessibility
          ignore-warnings: false

  wordpress:
    name: "Integration + Plugin Check (WP latest / WC latest / PHP 8.1)"
    runs-on: ubuntu-latest
    needs: static

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          extensions: mysqli, intl, zip
          tools: composer, wp-cli

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-no-dev-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-no-dev-

      - name: Cache WP-CLI downloads
        uses: actions/cache@v4
        with:
          path: ~/.wp-cli/cache
          key: ${{ runner.os }}-wp-cli-cache

      - name: Install composer dependencies
        run: composer install --no-dev --no-interaction --prefer-dist

      - name: Install WordPress
        run: |
          wp core download --path=/tmp/wordpress --allow-root
          wp config create --dbname=wordpress_test --dbuser=root --dbpass=root --dbhost=127.0.0.1 --path=/tmp/wordpress --allow-root
          wp core install --url=http://localhost --title="Test" --admin_user=admin --admin_password=admin --admin_email=test@test.com --path=/tmp/wordpress --allow-root

      - name: Install WooCommerce
        run: |
          wp plugin install woocommerce --activate --path=/tmp/wordpress --allow-root

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin-build
          path: /tmp/plugin-build

      - name: Install plugin from clean build
        run: |
          ZIP_FILE=$(ls /tmp/plugin-build/kiriminaja-official*.zip 2>/dev/null | head -1)
          test -n "$ZIP_FILE" || { echo "ERROR: build artifact not found"; exit 1; }
          echo "Found: $ZIP_FILE"
          unzip -q "$ZIP_FILE" -d /tmp/wordpress/wp-content/plugins/

      - name: Activate plugin
        run: |
          wp plugin activate kiriminaja-official --path=/tmp/wordpress --allow-root

      - name: Verify plugin is active
        run: |
          wp plugin list --status=active --path=/tmp/wordpress --allow-root | grep kiriminaja-official

      - name: Check for PHP fatal errors
        run: |
          wp eval 'echo "WordPress loaded OK\n";' --path=/tmp/wordpress --allow-root
          wp eval '
            $plugin_data = get_plugin_data("/tmp/wordpress/wp-content/plugins/kiriminaja-official/kiriminaja.php");
            echo "Plugin: " . $plugin_data["Name"] . "\n";
            echo "Version: " . $plugin_data["Version"] . "\n";
          ' --path=/tmp/wordpress --allow-root

      - name: Verify WooCommerce integration
        run: |
          wp eval '
            $methods = WC()->shipping()->get_shipping_methods();
            if (!isset($methods["kiriminaja-official"])) {
              echo "Registered methods: " . implode(", ", array_keys($methods)) . "\n";
              echo "FAIL: kiriminaja-official shipping method not registered\n";
              exit(1);
            }
            echo "KiriminAja shipping method registered OK\n";
          ' --path=/tmp/wordpress --allow-root

      - name: Deactivate and reactivate (lifecycle test)
        run: |
          wp plugin deactivate kiriminaja-official --path=/tmp/wordpress --allow-root
          wp plugin activate kiriminaja-official --path=/tmp/wordpress --allow-root
          wp eval 'echo "Reactivation OK\n";' --path=/tmp/wordpress --allow-root

      - name: Install plugin-check
        run: |
          wp plugin install plugin-check --activate --path=/tmp/wordpress --allow-root

      - name: Run Plugin Check (WP.org compliance)
        id: plugin-check
        run: |
          # wp plugin check exits 1 for any issue (errors OR warnings).
          # Capture output regardless, then fail only on errors.
          wp plugin check kiriminaja-official \
            --path=/tmp/wordpress \
            --allow-root \
            --format=json \
            --categories=general,plugin_repo,security,performance,accessibility \
            > /tmp/plugin-check-results.json 2>&1 || true
          cat /tmp/plugin-check-results.json
          ERRORS=$(php -r '
            $content = file_get_contents("/tmp/plugin-check-results.json");
            $sections = preg_split("/^FILE: /m", $content, -1, PREG_SPLIT_NO_EMPTY);
            $count = 0;
            foreach ($sections as $s) {
              $nl = strpos($s, "\n");
              $items = json_decode(trim(substr($s, $nl)), true) ?: [];
              foreach ($items as $i) { if ($i["type"]==="ERROR") $count++; }
            }
            echo $count;
          ')
          WARNINGS=$(php -r '
            $content = file_get_contents("/tmp/plugin-check-results.json");
            $sections = preg_split("/^FILE: /m", $content, -1, PREG_SPLIT_NO_EMPTY);
            $count = 0;
            foreach ($sections as $s) {
              $nl = strpos($s, "\n");
              $items = json_decode(trim(substr($s, $nl)), true) ?: [];
              foreach ($items as $i) { if ($i["type"]==="WARNING") $count++; }
            }
            echo $count;
          ')
          echo "Plugin Check: ${ERRORS} error(s), ${WARNINGS} warning(s)"
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::Plugin Check found ${ERRORS} error(s). Fix them before merging."
            exit 1
          fi

      - name: Upload Plugin Check results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plugin-check-results
          path: /tmp/plugin-check-results.json
          overwrite: true
