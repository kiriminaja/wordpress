name: Tests

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Cancel in-progress runs for the same PR/branch when a new commit is pushed.
concurrency:
  group: tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  static:
    name: "Static Tests (PHP 8.1)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          tools: composer

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        run: make test

      - name: Build official zip
        run: make zip plain

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-build
          path: kiriminaja-official.zip
          overwrite: true

  wordpress:
    name: "Integration + Plugin Check (WP latest / WC latest / PHP 8.1)"
    runs-on: ubuntu-latest
    needs: static

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.1"
          extensions: mysqli, intl, zip
          tools: composer, wp-cli

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-no-dev-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-no-dev-

      - name: Cache WP-CLI downloads
        uses: actions/cache@v4
        with:
          path: ~/.wp-cli/cache
          key: ${{ runner.os }}-wp-cli-cache

      - name: Install composer dependencies
        run: composer install --no-dev --no-interaction --prefer-dist

      - name: Install WordPress
        run: |
          wp core download --path=/tmp/wordpress --allow-root
          wp config create --dbname=wordpress_test --dbuser=root --dbpass=root --dbhost=127.0.0.1 --path=/tmp/wordpress --allow-root
          wp core install --url=http://localhost --title="Test" --admin_user=admin --admin_password=admin --admin_email=test@test.com --path=/tmp/wordpress --allow-root

      - name: Install WooCommerce
        run: |
          wp plugin install woocommerce --activate --path=/tmp/wordpress --allow-root

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin-build
          path: /tmp/plugin-build

      - name: Install plugin from clean build
        run: |
          test -f /tmp/plugin-build/kiriminaja-official.zip || { echo "ERROR: build artifact not found"; exit 1; }
          unzip -q /tmp/plugin-build/kiriminaja-official.zip -d /tmp/wordpress/wp-content/plugins/

      - name: Activate plugin
        run: |
          wp plugin activate kiriminaja-official --path=/tmp/wordpress --allow-root

      - name: Verify plugin is active
        run: |
          wp plugin list --status=active --path=/tmp/wordpress --allow-root | grep kiriminaja-official

      - name: Check for PHP fatal errors
        run: |
          wp eval 'echo "WordPress loaded OK\n";' --path=/tmp/wordpress --allow-root
          wp eval '
            $plugin_data = get_plugin_data("/tmp/wordpress/wp-content/plugins/kiriminaja-official/kiriminaja.php");
            echo "Plugin: " . $plugin_data["Name"] . "\n";
            echo "Version: " . $plugin_data["Version"] . "\n";
          ' --path=/tmp/wordpress --allow-root

      - name: Verify WooCommerce integration
        run: |
          wp eval '
            $methods = WC()->shipping()->get_shipping_methods();
            if (!isset($methods["kiriminaja-official"])) {
              echo "Registered methods: " . implode(", ", array_keys($methods)) . "\n";
              echo "FAIL: kiriminaja-official shipping method not registered\n";
              exit(1);
            }
            echo "KiriminAja shipping method registered OK\n";
          ' --path=/tmp/wordpress --allow-root

      - name: Deactivate and reactivate (lifecycle test)
        run: |
          wp plugin deactivate kiriminaja-official --path=/tmp/wordpress --allow-root
          wp plugin activate kiriminaja-official --path=/tmp/wordpress --allow-root
          wp eval 'echo "Reactivation OK\n";' --path=/tmp/wordpress --allow-root

      - name: Install plugin-check
        run: |
          wp plugin install plugin-check --activate --path=/tmp/wordpress --allow-root

      - name: Run Plugin Check (WP.org compliance)
        id: plugin-check
        continue-on-error: true
        run: |
          wp plugin check kiriminaja-official \
            --path=/tmp/wordpress \
            --allow-root \
            --format=json \
            --categories=general,plugin_repo,security,performance,accessibility \
            | tee /tmp/plugin-check-results.json
          # Surface error count in summary
          ERRORS=$(php -r '$d=json_decode(file_get_contents("/tmp/plugin-check-results.json"),true); echo array_sum(array_column($d??[],"errors"));' 2>/dev/null || echo "?")
          WARNINGS=$(php -r '$d=json_decode(file_get_contents("/tmp/plugin-check-results.json"),true); echo array_sum(array_column($d??[],"warnings"));' 2>/dev/null || echo "?")
          echo "Plugin Check: ${ERRORS} error(s), ${WARNINGS} warning(s)"
          echo "errors=${ERRORS}" >> "$GITHUB_OUTPUT"

      - name: Upload Plugin Check results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plugin-check-results
          path: /tmp/plugin-check-results.json
          overwrite: true
