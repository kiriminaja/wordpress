name: Tests

on:
  pull_request:
    branches:
      - main

jobs:
  static:
    name: "Static Tests (PHP ${{ matrix.php }})"
    runs-on: ubuntu-latest

    strategy:
      matrix:
        php: ["8.1", "8.2", "8.3"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        run: make test

  wordpress:
    name: "WP ${{ matrix.wp }} / WC ${{ matrix.wc }} / PHP ${{ matrix.php }}"
    runs-on: ubuntu-latest
    needs: static

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: "8.1"
            wp: "6.4"
            wc: "8.5"
          - php: "8.2"
            wp: "6.5"
            wc: "9.0"
          - php: "8.3"
            wp: "6.7"
            wc: "9.5"
          - php: "8.3"
            wp: "latest"
            wc: "latest"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mysqli, intl, zip
          tools: composer, wp-cli

      - name: Install composer dependencies
        run: composer install --no-dev --no-interaction --prefer-dist

      - name: Resolve WordPress version
        id: wp-version
        run: |
          if [ "${{ matrix.wp }}" = "latest" ]; then
            echo "version=$(wp cli info --format=json 2>/dev/null | jq -r '.wp_version // empty' || curl -s https://api.wordpress.org/core/version-check/1.7/ | jq -r '.offers[0].version')" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ matrix.wp }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install WordPress
        run: |
          wp core download --version=${{ matrix.wp == 'latest' && '' || matrix.wp }} --path=/tmp/wordpress --allow-root
          wp config create --dbname=wordpress_test --dbuser=root --dbpass=root --dbhost=127.0.0.1 --path=/tmp/wordpress --allow-root
          wp core install --url=http://localhost --title="Test" --admin_user=admin --admin_password=admin --admin_email=test@test.com --path=/tmp/wordpress --allow-root

      - name: Resolve WooCommerce version
        id: wc-version
        run: |
          if [ "${{ matrix.wc }}" = "latest" ]; then
            echo "slug=woocommerce" >> "$GITHUB_OUTPUT"
          else
            echo "slug=https://github.com/woocommerce/woocommerce/releases/download/${{ matrix.wc }}.0/woocommerce.zip" >> "$GITHUB_OUTPUT"
          fi

      - name: Install WooCommerce
        run: |
          wp plugin install ${{ steps.wc-version.outputs.slug }} --activate --path=/tmp/wordpress --allow-root

      - name: Install plugin
        run: |
          cp -r $GITHUB_WORKSPACE /tmp/wordpress/wp-content/plugins/kiriminaja-official

      - name: Activate plugin
        run: |
          wp plugin activate kiriminaja-official --path=/tmp/wordpress --allow-root

      - name: Verify plugin is active
        run: |
          wp plugin list --status=active --path=/tmp/wordpress --allow-root | grep kiriminaja-official

      - name: Check for PHP fatal errors
        run: |
          wp eval 'echo "WordPress loaded OK\n";' --path=/tmp/wordpress --allow-root
          wp eval '
            $plugin_data = get_plugin_data("/tmp/wordpress/wp-content/plugins/kiriminaja-official/kiriminaja.php");
            echo "Plugin: " . $plugin_data["Name"] . "\n";
            echo "Version: " . $plugin_data["Version"] . "\n";
          ' --path=/tmp/wordpress --allow-root

      - name: Verify WooCommerce integration
        run: |
          wp eval '
            $methods = WC()->shipping()->get_shipping_methods();
            if (!isset($methods["kiriminaja-official"])) {
              echo "Registered methods: " . implode(", ", array_keys($methods)) . "\n";
              echo "FAIL: kiriminaja-official shipping method not registered\n";
              exit(1);
            }
            echo "KiriminAja shipping method registered OK\n";
          ' --path=/tmp/wordpress --allow-root

      - name: Deactivate and reactivate (lifecycle test)
        run: |
          wp plugin deactivate kiriminaja-official --path=/tmp/wordpress --allow-root
          wp plugin activate kiriminaja-official --path=/tmp/wordpress --allow-root
          wp eval 'echo "Reactivation OK\n";' --path=/tmp/wordpress --allow-root
