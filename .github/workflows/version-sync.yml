name: Version Sync

on:
  push:
    tags:
      - "*"

jobs:
  sync-version:
    name: "Sync Version Numbers"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get tag version
        id: get_version
        run: |
          # Get the tag name (e.g., 2.0.11 or v2.0.11)
          TAG=${GITHUB_REF#refs/tags/}
          # Remove 'v' prefix if present
          VERSION=${TAG#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Update kiriminaja.php
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"

          # Update plugin header version
          sed -i "s/\* Version:.*/* Version:         $VERSION/" kiriminaja.php

          # Update KJ_PLUGIN_VERSION constant
          sed -i "s/define( 'KJ_PLUGIN_VERSION', '.*' );/define( 'KJ_PLUGIN_VERSION', '$VERSION' );/" kiriminaja.php

          # Update KJ_VERSION_PLUGIN constant
          sed -i "s/define('KJ_VERSION_PLUGIN', sanitize_text_field('.*') );/define('KJ_VERSION_PLUGIN', sanitize_text_field('$VERSION') );/" kiriminaja.php

          echo "✅ Updated kiriminaja.php"

      - name: Update readme.txt
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"

          # Update Stable tag
          sed -i "s/Stable tag: .*/Stable tag: $VERSION/" readme.txt

          echo "✅ Updated readme.txt"

      - name: Check if files changed
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No version changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Version changes detected"
          fi

      - name: Commit and push if changed
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add kiriminaja.php readme.txt
          git commit -m "chore: sync version to $VERSION [skip ci]"

          # Push to the branch (not the tag)
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          if [ "$BRANCH" == "HEAD" ]; then
            # We're in detached HEAD state (on a tag), find the branch
            BRANCH=$(git branch -r --contains HEAD | grep -v HEAD | head -1 | sed 's|origin/||' | xargs)
          fi

          git push origin HEAD:${BRANCH}

          echo "✅ Pushed version sync to branch: ${BRANCH}"

      - name: Summary
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          echo "## Version Sync Complete 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Updated Files:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ kiriminaja.php" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ readme.txt" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_changes.outputs.changed }}" == "true" ]; then
            echo "Changes have been committed and pushed to the repository." >> $GITHUB_STEP_SUMMARY
          else
            echo "No changes were needed (version already up to date)." >> $GITHUB_STEP_SUMMARY
          fi
